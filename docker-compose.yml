version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gym_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: superpassword123
      POSTGRES_DB: gym_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: